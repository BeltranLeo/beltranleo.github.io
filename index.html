---
layout: default
title: La Economía P2P
---

<div class="container-fluid p-5 text-center text-light" style="background-color: #067355">
  <h1>La Economía P2P</h1>
  <p>Un pódcast sobre Bitcoin Cash, intercambios voluntarios y el futuro descentralizado</p>
</div>

<div class="container p-3 my-3">

  <div class="row">
    <div class="col">
      <h1 class="text-center">Últimos episodios</h1>
    </div>
  </div>

  {% for episodio in site.data.episodios %}

  <div class="row justify-content-center">
    <div class="col-sm-12 col-lg-9">
      <div class="card my-3 bg-dark">
        <h4 class="card-header">{{ episodio.titulo }}</h4>
        <div class="card-body">
          {{ episodio.descripcion }}
        </div>
        <div class="card-footer text-center">
          <a href="{{ episodio.soundcloud }}" target="_blank" rel="noopener noreferrer"><button type="button" class="btn btn-secondary"><i class="fab fa-soundcloud"></i> SoundCloud</button></a>
          <a href="{{ episodio.telegram }}" target="_blank" rel="noopener noreferrer"><button type="button" class="btn btn-secondary"><i class="fab fa-telegram"></i> Telegram</button></a>
        </div>
      </div>
    </div>
  </div>

  {% endfor %}

</div>
