    <script>
      var baseurl = "https://markets.api.bitcoin.com/rates?c=BCH";
      function loadEu() {
        var xmlhttp = new XMLHttpRequest();
        xmlhttp.open("GET", baseurl, true);
        xmlhttp.onreadystatechange = function () {
          if (xmlhttp.readyState === 4 && xmlhttp.status === 200) {
            var persons = JSON.parse(xmlhttp.responseText);
            persons.filter((word) => {
              if (word.code == "USD") {
                var persons = word.rate.toFixed(2);
                var main = "";
                main = "1 BCH = " + persons + " USD";
                var tbl = main;
                document.getElementById("bch").innerHTML = tbl;
                loadDD(persons);
              }
            });
          }
        };
        xmlhttp.send();
      }
      function loadDD(persons) {
        var baseurl2 = "https://api.yadio.io/rate/ARS";
        var xmlhttp2 = new XMLHttpRequest();
        xmlhttp2.open("GET", baseurl2, true);
        xmlhttp2.onreadystatechange = function () {
          if (xmlhttp2.readyState === 4 && xmlhttp2.status === 200) {
            var arg = JSON.parse(xmlhttp2.responseText);
            console.log(arg.usd);
            var usdArg = arg.usd;
            var totalBtcArgCalculate = persons * usdArg;
            var totalBtcArg = totalBtcArgCalculate.toFixed(2);
            main = "1 BCH = " + totalBtcArg + " ARS";
            var tbl = main;
            document.getElementById("personinfo").innerHTML = tbl;
          }
        };
        xmlhttp2.send();
      }
      window.onload = function () {
        loadEu();
      };
    </script>
    <title>Bitcoin Cash Argentina</title>
  </head>
